version: '3.8'

services:
  backend:
    build: ./backend
    image: dikta-backend:latest
    ports:
      - "5001:5000"
    container_name: dikta-backend
    restart: unless-stopped
    env_file:
      - .env
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    image: dikta-frontend:latest
    ports:
      - "5175:5173"
    container_name: dikta-frontend
    depends_on:
      - backend
    environment:
      - VITE_API_URL=
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
